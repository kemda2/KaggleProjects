<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Panodan Resmi Base64'e Çevirme</title>
</head>
<body>
  <h2>Panodan Resim Yapıştırın</h2>
  <textarea id="base64Output" cols="80" rows="10"></textarea>

  <script>
    document.body.addEventListener('paste', function(e) {
      var items = e.clipboardData.items;

      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        
        // Eğer item bir resimse
        if (item.type.indexOf("image") === 0) {
          var file = item.getAsFile();  // Resim dosyasını al
          var reader = new FileReader();

          reader.onloadend = function() {
            // Base64 kodunu textarea'ya yazdır
            document.getElementById('base64Output').value = reader.result;
          }

          // Resmi Base64 formatına oku
          if (file) {
            reader.readAsDataURL(file);
          }
        }
      }
    });
  </script>
</body>
</html>
